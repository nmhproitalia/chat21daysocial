<body>
<div id="unified-header"></div>



<!-- SEZIONE PAGE WRAPPER -->
<div class="page-wrapper">
<main class="page-main">
<div class="container">
<div id="app">



 <!-- SEZIONE STATISTICHE -->
<h3><i class="fas fa-chart-pie"></i> Statistiche Challengers Iscritti</h3>
<div class="card" style="margin-top: 20px;">
<h4 style="margin: 0 0 15px 0; font-size: 1rem; font-weight: 700; color: var(--garden-green);">Conteggio Iscritti Effettivi</h4>
<div style="display: flex; gap: 20px; flex-wrap: wrap;">
<div style="flex: 1; min-width: 150px;">
<p style="margin: 0 0 5px 0; font-size: 0.85rem; color: #666; font-weight: 600;">Totale Challengers:</p>
<h3 id="totalChallengersCount" style="margin: 0; font-size: 2rem; font-weight: 900; color: var(--garden-green);">0</h3>
</div>
<div style="flex: 1; min-width: 150px;">
<p style="margin: 0 0 5px 0; font-size: 0.85rem; color: #666; font-weight: 600;">Totale Assistenti:</p>
<h3 id="totalAssistantsCount" style="margin: 0; font-size: 2rem; font-weight: 900; color: var(--grass);">0</h3>
</div>
</div>
</div>



<!-- SEZIONE IMPOSTAZIONI COACH -->
<h3><i class="fas fa-user-gear"></i> Impostazioni Pubbliche Coach & Challenge</h3>
<div class="card">
<form id="coachSettingsForm">
<div class="form-grid">
<div class="form-group"><label>Nome Coach</label><input type="text" id="setCoachFirstName" placeholder="Nome"></div>
<div class="form-group"><label>Cognome Coach</label><input type="text" id="setCoachLastName" placeholder="Cognome"></div>
<div class="form-group"><label>Email Pubblica</label><input type="email" id="setCoachEmail" placeholder="email@coach.com"></div>
<div class="form-group"><label>Telefono Pubblico</label><input type="tel" id="setCoachPhone" placeholder="+39 000 0000000"></div>
<div class="form-group"><label>Data Inizio Challenge</label><input type="date" id="setChallengeDate"></div>
<div class="form-group"><label>Ora Inizio Challenge</label><input type="time" id="setChallengeTime"></div>
</div>dahbod-submtbn
<button type="submit" class="btn-discord" style="margin-top: 1.5rem;">Salva Impostazioni Globali</button>
</form>
</div>



<!-- SEZIONE GESTIONE CHALLENGERS -->
<h3><i class="fas fa-users-gear"></i> Gestione Challengers</h3>
<div class="card" id="userGrid"></div>
