<!-- MODAL BIA -->
<div id="biaModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:10000; align-items:center; justify-content:center;">
<div class="card form-container" style="max-width:600px; max-height:90vh; overflow-y:auto; position:relative;">
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
<h3><i class="fas fa-calculator"></i> Inserisci Dati BIA</h3>
<button onclick="closeBIAModal()" style="background:none; border:none; font-size:1.5rem; cursor:pointer; color:#666;">&times;</button>
</div>
<form id="biaModalForm">
<div class="form-group">
<label for="modalHeight">Altezza (cm)</label>
<input type="number" id="modalHeight" step="0.1" required placeholder="Es. 175">
</div>
<div class="form-group">
<label for="modalAge">Età</label>
<input type="number" id="modalAge" step="1" required placeholder="Es. 35">
</div>
<div class="form-group">
<label for="modalGender">Sesso</label>
<select id="modalGender" required>
<option value="male">Maschio</option>
<option value="female">Femmina</option>
</select>
</div>
<div class="form-group">
<label for="modalWeight">Peso (kg)</label>
<input type="number" id="modalWeight" step="0.1" required placeholder="Es. 75.0">
</div>
<div class="form-group">
<label for="modalBodyFat">Massa Grassa (%)</label>
<input type="text" id="modalBodyFat" step="0.1" required placeholder="Es. 20.5">
</div>
<div class="form-group">
<label for="modalHydration">Idratazione (%)</label>
<input type="text" id="modalHydration" step="0.1" required placeholder="Es. 55.0">
</div>
<div class="form-group">
<label for="modalVisceralFat">Grasso Viscerale</label>
<input type="text" id="modalVisceralFat" step="1" required placeholder="Es. 8">
</div>
<div class="form-group">
<label for="modalLeanMass">Massa Magra (kg)</label>
<input type="text" id="modalLeanMass" step="0.1" required placeholder="Es. 55.0">
</div>
<div class="form-group">
<label for="modalBoneMass">Massa Ossea (kg)</label>
<input type="text" id="modalBoneMass" step="0.1" required placeholder="Es. 2.5">
</div>
<div class="form-group">
<label for="modalMetabolicAge">Età Metabolica</label>
<input type="text" id="modalMetabolicAge" step="1" required placeholder="Es. 30">
</div>
</div>
<button type="submit" class="sign-in_btn">SALVA DATI BIA</button>
</form>
<div id="biaModalMsg"></div>
</div>
</div>

<!-- SEZIONE SCRIPT -->
<script type="module">
import "./components/general/app.js?v=1.0";
import { initHeader } from "./components/general/header/header.js?v=6.0";
import { initFooter } from "./components/general/footer/footer-brand.js?v=5.0";
import { initDashboard } from "./components/dashboard/dashboard-manager.js?v=9.0";
import { auth, db } from "./js/firebase.js";

document.addEventListener('DOMContentLoaded', () => {
initHeader();
initFooter();
initDashboard();

// Funzione per aprire date/time picker cliccando sulle icone
const calendarIcon = document.getElementById('calendarIcon');
const clockIcon = document.getElementById('clockIcon');
const dateInput = document.getElementById('setChallengeDate');
const timeInput = document.getElementById('setChallengeTime');

if (calendarIcon && dateInput) {
calendarIcon.addEventListener('click', () => {
dateInput.showPicker ? dateInput.showPicker() : dateInput.focus();
});
}

if (clockIcon && timeInput) {
clockIcon.addEventListener('click', () => {
timeInput.click();
});
}
});
</script>
