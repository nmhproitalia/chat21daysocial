<!-- MODAL BIA -->
<div id="biaModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:99999; align-items:center; justify-content:center; flex-direction:column;">
<div class="card form-container" style="max-width:600px; max-height:90vh; overflow-y:auto; position:relative; z-index:100000; padding:40px;">
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
<h3 style="margin:0; font-size:1.25rem; font-weight:700; color:#266431;"><i class="fas fa-calculator"></i> Inserisci Dati BIA</h3>
<button onclick="closeBIAModal()" style="background:none; border:none; font-size:1.5rem; cursor:pointer; color:#666;">&times;</button>
</div>
<form id="biaModalForm">
<div class="form-grid">
<div class="input_container">
<label for="modalHeight" class="input_label">Altezza (cm)</label>
<input type="number" id="modalHeight" step="0.1" min="50" max="300" required placeholder="Es. 175" class="input_field">
</div>
<div class="input_container">
<label for="modalAge" class="input_label">Età</label>
<input type="number" id="modalAge" step="1" min="5" max="120" required placeholder="Es. 35" class="input_field">
</div>
<div class="input_container">
<label for="modalGender" class="input_label">Sesso</label>
<select id="modalGender" class="input_field" style="appearance:none; -webkit-appearance:none; -moz-appearance:none; background-image:none;">
<option value="male">Maschio</option>
<option value="female">Femmina</option>
</select>
</div>
<div class="input_container">
<label for="modalWeight" class="input_label">Peso (kg)</label>
<input type="number" id="modalWeight" step="0.1" min="10" max="300" required placeholder="Es. 75.0" class="input_field">
</div>
<div class="input_container">
<label for="modalBodyFat" class="input_label">Massa Grassa (%)</label>
<input type="number" id="modalBodyFat" step="0.1" min="2" max="70" required placeholder="Es. 20.5" class="input_field">
</div>
<div class="input_container">
<label for="modalHydration" class="input_label">Idratazione (%)</label>
<input type="number" id="modalHydration" step="0.1" min="30" max="75" required placeholder="Es. 55.0" class="input_field">
</div>
<div class="input_container">
<label for="modalVisceralFat" class="input_label">Grasso Viscerale</label>
<input type="number" id="modalVisceralFat" step="1" min="1" max="40" required placeholder="Es. 8" class="input_field">
</div>
<div class="input_container">
<label for="modalLeanMass" class="input_label">Massa Magra (kg)</label>
<input type="number" id="modalLeanMass" step="0.1" min="10" max="200" required placeholder="Es. 55.0" class="input_field">
</div>
<div class="input_container">
<label for="modalBoneMass" class="input_label">Massa Ossea (kg)</label>
<input type="number" id="modalBoneMass" step="0.1" min="0.5" max="15" required placeholder="Es. 2.5" class="input_field">
</div>
<div class="input_container">
<label for="modalMetabolicAge" class="input_label">Età Metabolica</label>
<input type="number" id="modalMetabolicAge" step="1" min="5" max="120" required placeholder="Es. 30" class="input_field">
</div>
</div>
<div class="input_container full-width" style="margin-top:20px;">
<button type="submit" class="sign-in_btn">SALVA DATI BIA</button>
</div>
</form>
<div id="biaModalMsg"></div>
</div>
</div>

<!-- SEZIONE FOOTER -->

<!-- SEZIONE SCRIPT -->
<script type="module">
import "./components/general/app.js?v=1.0";
import { initHeader } from "./components/general/header/header.js?v=6.0";
import { initFooter } from "./components/general/footer/footer-brand.js?v=5.0";
import { initDashboard } from "./components/dashboard/dashboard-manager.js?v=9.0";
import { toggleAccordion } from "./components/profile/profile-accordion.js?v=1.0";
import { auth, db } from "./js/firebase.js";

document.addEventListener('DOMContentLoaded', () => {
initHeader();
initFooter();
initDashboard();

// Funzione per aprire date/time picker cliccando sulle icone
const calendarIcon = document.getElementById('calendarIcon');
const clockIcon = document.getElementById('clockIcon');
const dateInput = document.getElementById('setChallengeDate');
const timeInput = document.getElementById('setChallengeTime');

if (calendarIcon && dateInput) {
calendarIcon.addEventListener('click', () => {
dateInput.showPicker ? dateInput.showPicker() : dateInput.focus();
});
}

if (clockIcon && timeInput) {
clockIcon.addEventListener('click', () => {
timeInput.click();
});
}
});
</script>
