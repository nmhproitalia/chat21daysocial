<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="apple-touch-icon" sizes="180x180" href="https://www.progettobenessere.info/ico/favicon-180x180.png">
<link rel="icon" type="image/png" sizes="32x32" href="https://www.progettobenessere.info/ico/favicon-32x32.png">

<!-- SEZIONE BODY -->
<body>
<div id="unified-header"></div>



<!-- SEZIONE PAGE WRAPPER -->
<div class="page-wrapper">
<main class="page-main">
<div class="container">
<div id="app">



<!-- SEZIONE VALUTAZIONE BENESSERE -->
<div class="profile-group">
<h3><i class="fas fa-heartbeat"></i> 1. Valutazione del Benessere</h3>
<div id="wellnessSummary" class="card wellness-status-card">
<div class="status-header"><i id="wellnessStatusIcon" class="fas fa-clipboard-check"></i><span id="wellnessStatusText">Stato: Da effettuare</span></div>
<p id="wellnessLastUpdate" class="last-update-text" style="margin-bottom: 1.5rem;">Esegui il test ufficiale per iniziare il tuo percorso.</p>
<button id="startWellnessTestBtn" class="btn-discord"><i class="fas fa-play"></i> Inizia Valutazione Benessere</button>
</div>
</div>



<!-- SEZIONE INPUT DATI BIA -->
<div class="bia-input-section">
<h3><i class="fas fa-scale-balanced"></i> 2. Inserimento Dati BIA</h3>
<form id="biaForm" class="card">
<div class="form-grid">
<div class="form-group"><label for="weight">Peso (kg)</label><input type="number" id="weight" step="0.1" required></div>
<div class="form-group"><label for="bodyFat">Massa Grassa (%)</label><input type="number" id="bodyFat" step="0.1" required></div>
<div class="form-group"><label for="hydration">Idratazione (%)</label><input type="number" id="hydration" step="0.1" required></div>
<div class="form-group"><label for="visceralFat">Grasso Viscerale</label><input type="number" id="visceralFat" step="1" required></div>
<div class="form-group"><label for="leanMass">Massa Magra (kg)</label><input type="number" id="leanMass" step="0.1" required></div>
<div class="form-group"><label for="boneMass">Massa Ossea (kg)</label><input type="number" id="boneMass" step="0.1" required></div>
<div class="form-group"><label for="metabolicAge">Età Metabolica</label><input type="number" id="metabolicAge" step="1" required></div>
<div class="form-group"><label>BMI (Calcolato)</label><input type="number" id="bmi" readonly></div>
</div>
<button type="submit" class="btn-discord btn-discord--success" style="margin-top: 1.5rem;">Salva Dati BIA</button>
</form>
</div>



<!-- SEZIONE RISULTATI PARAMETRI BIA -->
<div class="profile-group">
<h3><i class="fas fa-calculator"></i> 3. Risultati e Parametri BIA</h3>
<div id="biaParamsContainer" class="form-grid">
<div class="bia-param-card card"><label>Fabbisogno Acqua</label><div id="waterNeedsDisplay" class="param-value" style="font-size: 1.5rem; font-weight: 800; color: var(--primary-color);">-- L/giorno</div></div>
<div class="bia-param-card card"><label>Fabbisogno Proteico</label><div id="proteinNeedsDisplay" class="param-value" style="font-size: 1.5rem; font-weight: 800; color: var(--primary-color);">-- g/giorno</div></div>
<div class="bia-param-card card"><label>Metabolismo Basale</label><div id="bmrDisplay" class="param-value" style="font-size: 1.5rem; font-weight: 800; color: var(--primary-color);">-- kcal</div></div>
</div>
</div>



</div>
</div>
</main>
</div>



<!-- SEZIONE FOOTER -->
<div id="unified-footer"></div>



<!-- SEZIONE SCRIPT -->
<script type="module">
import { initHeader } from "./components/header/header.js?v=6.0";
import { initFooter } from "./components/footer/footer-brand.js?v=4.0";
import { setupBiaInputActions } from "./js/profile-wellness-handler.js?v=5.0";
document.addEventListener('DOMContentLoaded', () => {
initHeader();
initFooter();
setupBiaInputActions();
});
</script>



</body>
</html>
